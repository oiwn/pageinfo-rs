name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Dry run
        run: cargo publish --dry-run

      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
