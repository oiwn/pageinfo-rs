name: Publish

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Read package version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on crates.io
        id: crates
        run: |
          STATUS=$(curl -s -o /tmp/crate.json -w "%{http_code}" "https://crates.io/api/v1/crates/pageinfo-rs/${{ steps.version.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry run
        if: steps.crates.outputs.published != 'true'
        run: cargo publish --dry-run

      - name: Publish
        if: steps.crates.outputs.published != 'true'
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

      - name: Skip publish
        if: steps.crates.outputs.published == 'true'
        run: echo "Version ${{ steps.version.outputs.version }} is already published on crates.io"
